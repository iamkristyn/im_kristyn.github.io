<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kristyn Universe</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="description" content="Kristyn — film, photography, art. Dreamcore, cool tone." />
</head>
<body>
  <header class="topbar">
    <div class="title-block">
      <h1>Kristyn</h1>
      <p>Film · Photography · Art · 2025</p>
    </div>
    <div class="meta-block">
      <p>London / Shanghai</p>
      <p>
        <a href="https://instagram.com/" target="_blank">@your.ig</a>
      </p>
    </div>
  </header>

  <main class="wall">
    <!-- each "entry" = one image + a small caption, like cherrywood -->
    <article class="entry">
      <img src="assets/photo1.png" alt="Work 01" loading="lazy" />
      <p class="caption">“soft neon portrait”, 2025</p>
    </article>

    <article class="entry">
      <img src="assets/photo2.png" alt="Work 02" loading="lazy" />
      <p class="caption">photo / editorial / london</p>
    </article>

    <article class="entry">
      <img src="assets/film1.png" alt="Work 03" loading="lazy" />
      <p class="caption">film still — selene (wip)</p>
    </article>

    <article class="entry">
      <img src="assets/art1.png" alt="Work 04" loading="lazy" />
      <p class="caption">art / poster / experiment</p>
    </article>

    <!-- duplicate these article blocks for more works -->
  </main>

  <footer class="foot">
    <p>Kristyn Universe · built on GitHub Pages · 2025</p>
  </footer>

  <script>
    // nice tiny fade for images
    const imgs = document.querySelectorAll('.entry');
    const io = new IntersectionObserver((ents)=>{
      ents.forEach(e=>{
        if(e.isIntersecting){
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, {threshold:0.1});
    imgs.forEach(el=>io.observe(el));
  </script>
</body>
</html>
